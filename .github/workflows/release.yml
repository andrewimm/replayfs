name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.asset_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            asset_name: replayfs-macos-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            asset_name: replayfs-macos-x64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_name: replayfs-linux-x64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            asset_name: replayfs-linux-x64-musl

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Strip binary
        run: strip target/${{ matrix.target }}/release/replayfs

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: target/${{ matrix.target }}/release/replayfs

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          set -euo pipefail
          mkdir -p artifacts/release
          for f in artifacts/*/*; do
            [ -f "$f" ] || continue
            adir="$(basename "$(dirname "$f")")"
            mv "$f" "artifacts/release/${adir}"
          done
          ls -la artifacts/release

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/release/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
